# 「n版」または「n版m刷」の特定タグが push されると、
# 電子版および印刷用 PDF を添付したリリースが作成します。

name: Publish and Release PDF

on:
  push:
    tags:
      - '*版'
      - '*版*刷'

permissions:
  contents: write

jobs:
  publish-and-release-pdf:
    name: Build and Publish PDF
    runs-on: ubuntu-latest

    # 環境変数を定義
    env:
      # 生成される PDF のパス
      EBOOK_PDF_PATH: ./output/output.pdf
      PRESS_PDF_PATH: ./output/press.pdf
    
    steps:

      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
              
      # PDFを作成する
      - name: make PDF
        run: |
          corepack enable
          yarn install --immutable
          
          yarn pdf
          if [ ! -f "${EBOOK_PDF_PATH}" ]; then
            echo "エラー: 電子版 PDF の生成に失敗しました。"
            exit 1
          fi
      
      # vivliostyle-cli コンテナ（UID 1000）が book/ に書き込めるようにする
      - name: Fix workspace ownership for vivliostyle container
        run: sudo chown -R 1000:1000 ${{ github.workspace }}
      
      # 印刷入稿用 PDF を作成（Docker コンテナ内 UID 1000 で実行）
      - name: Build press PDF
        run: |
          make press
          if [ ! -f "${PRESS_PDF_PATH}" ]; then
            echo "エラー: 印刷入稿用 PDF の生成に失敗しました。"
            exit 1
          fi
      
      # リリース作成のために所有権を runner に戻す
      - name: Restore workspace ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}
      
      # リリースの作成
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            ${{ env.EBOOK_PDF_PATH }}
            ${{ env.PRESS_PDF_PATH }}
