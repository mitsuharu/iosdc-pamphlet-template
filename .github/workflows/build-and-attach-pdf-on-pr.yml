# PR を作成したら、PDF を作成して、その PDF を PR に添付する

name: Build and Attach PDF on Pull-Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-attach-pdf-on-pr:
    runs-on: ubuntu-latest

    # 環境変数を定義
    env:
      # 生成される PDF のパス
      PDF_PATH: ./output/output.pdf

    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'

      # PDFを作成する
      - name: make PDF
        run: |
          corepack enable
          yarn install --immutable
          yarn pdf

      # PDFが生成されたかどうかをチェックする
      - name: Check if PDF exists
        run: |
          if [ ! -f "${PDF_PATH}" ]; then
            echo "エラー: PDF の生成に失敗しました。"
            exit 1
          fi

      # アーティファクトとしてPDFをアップロード
      - name: Upload PDF as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: artifact-upload-step
        with:
          name: "ebook.pdf"
          path: "${{ env.PDF_PATH }}"
          if-no-files-found: error
          archive: false

      # PRにPDFのリンクを含むコメントを投稿または更新
      - name: Create or Update PR Comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        env:
          ARTIFACT_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.artifact-upload-step.outputs.artifact-id }}"
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            :page_facing_up: [PDF](${{ env.ARTIFACT_URL }}) が作成されました
