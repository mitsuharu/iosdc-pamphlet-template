# PR を作成したら、PDF を作成して、その PDF を PR に添付する

name: Build and Attach PDF on Pull-Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-attach-pdf-on-pr:
    runs-on: ubuntu-latest

    # 環境変数を定義
    env:
      # 生成される PDF のパス
      PDF_PATH: ./output/output.pdf

    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: '.node-version'

      # PDFを作成する
      - name: make PDF
        run: |
          corepack enable
          yarn install --immutable
          yarn pdf

      # PDFが生成されたかどうかをチェックする
      - name: Check if PDF exists
        run: |
          if [ ! -f "${PDF_PATH}" ]; then
            echo "エラー: PDF の生成に失敗しました。"
            exit 1
          fi

      # アーティファクトとしてPDFをアップロード
      - name: Upload PDF as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        id: artifact-upload-step
        with:
          name: "ebook.pdf"
          path: "${{ env.PDF_PATH }}"
          if-no-files-found: error
          archive: false

      # PRにPDFのリンクを含むコメントを投稿または更新
      - name: Create or Update PR Comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        env:
          ARTIFACT_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.artifact-upload-step.outputs.artifact-id }}"
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            :page_facing_up: [PDF](${{ env.ARTIFACT_URL }}) が作成されました
